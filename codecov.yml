# Codecov configuration.
# Docs: https://docs.codecov.com/docs/codecov-yaml
# Validate: curl -X POST --data-binary @codecov.yml https://codecov.io/validate

# --- PR comment ---------------------------------------------------------------
# Recipe: "Show project coverage changes on the pull request comment"
# https://docs.codecov.com/docs/common-recipe-list#show-project-coverage-changes-on-the-pull-request-comment
comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false       # post the comment even when coverage is unchanged
  require_base: false          # tolerate missing base report (e.g. first PR after enablement)
  require_head: true           # head report must exist
  hide_project_coverage: false # show project-level coverage delta, not just patch

# --- Status checks ------------------------------------------------------------
# Mirror the local fail_under=80 gate on the GitHub status check.
coverage:
  status:
    project:
      default:
        target: auto           # compare against the base commit
        threshold: 1%          # tolerate up to a 1% drop before failing
        if_ci_failed: success  # do not double-report when CI already failed
    patch:
      default:
        target: 80%            # new/changed lines must hit the same bar as overall
        if_ci_failed: success
