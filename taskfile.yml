# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  # Override to point at a local schema file or a PR preview URL.
  SCHEMA_URL: '{{.SCHEMA_URL | default "https://ocx.sh/schemas/url-index/v1.json"}}'
  SCHEMA_FILE: 'schemas/url-index.v1.json'

tasks:
  default:
    desc: Fast feedback loop — lint + types + tests
    cmds:
      - task: verify

  verify:
    desc: Full quality gate (format check, lint, types, tests, coverage)
    cmds:
      - task: format:check
      - task: lint
      - task: types
      - task: test
      - task: cov:report

  format:
    desc: Apply formatting
    cmds:
      - uv run --extra dev ruff format src tests

  format:check:
    desc: Check formatting without applying
    cmds:
      - uv run --extra dev ruff format --check src tests

  lint:
    desc: Lint source
    cmds:
      - uv run --extra dev ruff check src tests

  types:
    desc: Type-check source
    cmds:
      - uv run --extra dev pyright

  test:
    desc: Run pytest under coverage
    cmds:
      - uv run --extra dev coverage run -m pytest

  cov:report:
    desc: Print coverage report (enforces fail_under from pyproject.toml)
    cmds:
      - uv run --extra dev coverage report

  cov:xml:
    desc: Emit coverage.xml for CI upload
    cmds:
      - uv run --extra dev coverage xml

  cov:html:
    desc: Generate HTML coverage report at htmlcov/ for local browsing
    cmds:
      - uv run --extra dev coverage html

  schema:fetch:
    desc: Fetch the canonical url-index JSON Schema from the website
    cmds:
      - mkdir -p schemas
      - curl --fail --silent --show-error --location "{{.SCHEMA_URL}}" -o {{.SCHEMA_FILE}}

  codegen:
    desc: Regenerate src/ocx_mirror_sdk/_schema.py from the JSON Schema
    deps: [schema:fetch]
    cmds:
      - >
        uv run --extra dev
        datamodel-codegen
        --input {{.SCHEMA_FILE}}
        --input-file-type jsonschema
        --output src/ocx_mirror_sdk/_schema.py
        --output-model-type dataclasses.dataclass
        --target-python-version 3.13
